<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethara HQ | Task Manager</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        
        /* THICK, VERY VISIBLE SCROLLBARS AS REQUESTED */
        .custom-scrollbar { overflow-y: auto; overflow-x: auto; }
        .custom-scrollbar::-webkit-scrollbar { width: 14px; height: 14px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; border: 1px solid #e2e8f0; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 8px; border: 3px solid #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen font-sans selection:bg-sky-200 overflow-hidden">
    <!-- Ambient Gentle Background Effects -->
    <div class="fixed inset-0 pointer-events-none z-[-1] bg-gradient-to-br from-white via-slate-50 to-sky-50">
        <div class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] rounded-full bg-sky-200/40 blur-[120px]"></div>
        <div class="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] rounded-full bg-blue-100/40 blur-[120px]"></div>
    </div>

    {% if request.cookies.get('access_token') %}
    <div class="flex h-screen w-full">
        <!-- Sidebar Navigation -->
        <aside class="w-64 bg-white border-r border-slate-200 flex flex-col z-20 shadow-sm">
            <div class="p-6 border-b border-slate-100">
                <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-sky-600 to-blue-600 tracking-tight flex items-center">
                    <svg class="w-8 h-8 mr-2 text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    ETHARA
                </h1>
            </div>
            <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto custom-scrollbar">
                <a href="/dashboard" class="flex items-center px-4 py-3 bg-sky-50 text-sky-700 rounded-xl border border-sky-100 font-medium transition-all shadow-sm">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                    Dashboard
                </a>
            </nav>
            <div class="p-6 border-t border-slate-100 bg-slate-50">
                <button hx-post="/api/auth/logout" hx-swap="none" class="w-full bg-white hover:bg-slate-100 border border-slate-200 text-slate-700 hover:text-red-600 px-4 py-2.5 rounded-xl text-sm font-semibold transition-all shadow-sm flex items-center justify-center">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    Sign Out
                </button>
            </div>
        </aside>

        <!-- Main Content Viewport -->
        <main class="flex-1 flex flex-col h-screen overflow-hidden">
            <header class="h-20 border-b border-slate-200 bg-white/80 backdrop-blur-md flex items-center justify-between px-8 z-10 shadow-sm">
                <h2 class="text-xl font-bold text-slate-800 tracking-wide">Command Center</h2>
                <div class="flex items-center space-x-4">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-sky-400 to-blue-500 flex items-center justify-center text-sm text-white font-bold shadow-md border border-sky-200">
                        OP
                    </div>
                </div>
            </header>
            <div class="flex-1 overflow-y-auto p-6 md:p-10 custom-scrollbar relative">
                {% if error %}
                <div class="bg-red-50 border border-red-200 text-red-700 p-4 rounded-xl mb-6 text-center shadow-sm">
                    {{ error }}
                </div>
                {% endif %}
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
    {% else %}
    <!-- Login Form Area (Light Theme) -->
    <main class="container mx-auto p-4 md:p-8 mt-2 h-screen flex items-center justify-center">
        <div class="w-full max-w-md bg-white p-10 rounded-3xl shadow-[0_10px_40px_rgba(0,0,0,0.08)] border border-slate-100 relative overflow-hidden">
            
            <div class="flex justify-center mb-8 relative z-10">
                <svg class="w-12 h-12 text-sky-500 drop-shadow-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            
            <h2 class="text-3xl font-black mb-8 text-center text-slate-800 relative z-10 tracking-tight">Portal Access</h2>
            
            <form hx-post="/api/auth/login" hx-swap="none" hx-on::after-request="if(!event.detail.successful) { alert(JSON.parse(event.detail.xhr.response).detail || 'Login failed'); }" class="space-y-5 relative z-10">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2 ml-1">Email Designation</label>
                    <input type="email" name="email" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-900 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all shadow-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2 ml-1">Passcode</label>
                    <input type="password" name="password" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-900 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all shadow-sm">
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-sky-500 to-blue-600 hover:from-sky-600 hover:to-blue-700 text-white font-bold py-3.5 px-4 rounded-xl transition-all shadow-md mt-4">Authenticate</button>
            </form>
            
            <div class="mt-10 pt-6 border-t border-slate-100 text-center relative z-10">
                <p class="text-slate-500 text-xs uppercase tracking-wider font-bold mb-4">Request Clearance</p>
                <form hx-post="/api/auth/register" hx-swap="none" hx-on::after-request="if(event.detail.successful) { alert('Clearance requested successfully! Please login.'); this.reset(); } else { alert(JSON.parse(event.detail.xhr.response).detail || 'Registration failed'); }" class="space-y-3">
                    <select name="role" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-700 text-sm focus:outline-none focus:border-sky-500 transition-all shadow-sm">
                        <option value="MEMBER">Standard Operative</option>
                        <option value="ADMIN">Command Staff</option>
                    </select>
                    <input type="email" name="email" placeholder="New Email" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-900 text-sm focus:outline-none focus:border-sky-500 transition-all shadow-sm">
                    <input type="password" name="password" placeholder="New Passcode" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-900 text-sm focus:outline-none focus:border-sky-500 transition-all shadow-sm">
                    <button type="submit" class="w-full bg-white hover:bg-slate-50 text-slate-700 font-bold py-3 px-4 rounded-xl text-sm transition-all border border-slate-200 shadow-sm mt-2">Submit Request</button>
                </form>
            </div>
        </div>
    </main>
    {% endif %}
</body>
</html>
