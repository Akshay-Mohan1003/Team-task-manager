{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto mt-10 bg-[#0F111A] border border-[#1E2538] p-8 rounded-2xl shadow-xl relative z-10">
    <div class="mb-8 border-b border-[#1E2538] pb-6">
        <h2 class="text-2xl font-black text-white flex items-center tracking-wide">
            <svg class="w-6 h-6 mr-3 text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            Initialize Project Workspace
        </h2>
        <p class="text-slate-400 text-sm mt-2">Provision a new dedicated environment for tasks.</p>
    </div>

    <form hx-post="/api/projects" hx-swap="none" hx-on::after-request="if(event.detail.successful) { window.location.href = '/dashboard'; } else { alert('Failed to create project'); }" class="space-y-6">
        <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2 ml-1">Workspace Designation</label>
            <input type="text" name="name" placeholder="Project Name" required class="w-full bg-[#0B0E14] border border-[#1E2538] rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all shadow-sm">
        </div>
        <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2 ml-1">Operational Description</label>
            <textarea name="description" placeholder="Project goals..." class="w-full bg-[#0B0E14] border border-[#1E2538] rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all shadow-sm h-32"></textarea>
        </div>
        
        <div class="pt-4 border-t border-[#1E2538] flex justify-end gap-3">
            <a href="/dashboard" class="px-6 py-3 rounded-xl border border-[#1E2538] text-slate-400 hover:text-white hover:bg-[#1E2538] font-bold text-sm transition-colors">Cancel</a>
            <button type="submit" class="bg-gradient-to-r from-sky-500 to-blue-600 hover:from-sky-600 hover:to-blue-700 text-white font-bold py-3 px-6 rounded-xl text-sm transition-all shadow-md">Deploy Workspace</button>
        </div>
    </form>
</div>
{% endblock %}
